<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMR Competitor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
      background-attachment: fixed;
      color: white;
      text-align: center;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 25px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffd700;
    }

    /* MAIN CARD */
    .container {
      margin: 60px auto;
      max-width: 400px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    img {
      width: 140px;
      border-radius: 50%;
      border: 2px solid white;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    h3 {
      margin: 5px 0;
      color: #ffd700;
      font-weight: 500;
    }

    p {
      font-size: 14px;
      color: #eee;
    }

  </style>
</head>

<body>

  <nav>
    <a href="update.html">Update</a>
    <a href="registration.html">Registration</a>
    <a href="exam.html">Exam</a>
  </nav>

  <div class="container">
    <img src="logo.png" alt="OMR Competitor Logo">
    <h1>OMR Competitor</h1>
    <h3>জিততেই হবে</h3>
    <p>একটি একাডেমিক অনলাইন পরীক্ষার প্ল্যাটফর্ম</p>
  </div>

</body>
</html>
